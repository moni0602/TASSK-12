<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Event</title>

    <style>
        body {
            text-align: center;
            background-color: #f0f8ff;
            font-family: Arial;
        }

        h2 {
            color: #3333cc;
        }

        input {
            padding: 8px;
            border: 2px solid #3333cc;
            border-radius: 5px;
        }

        button {
            padding: 8px 15px;
            background-color: #3333cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5555ff;
        }

        #result {
            color: green;
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h2>JavaScript Demo</h2>

    <input type="text" id="name" placeholder="Enter your name">
    
    <br><br>

    <button onclick="showName()">Submit</button>

    <p id="result"></p>

    <script>
        function showName() {
            var userName = document.getElementById("name").value;
            document.getElementById("result").innerHTML = "Hello " + userName;
        }
    </script>

</body>
</html>
